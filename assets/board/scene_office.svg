<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="of-bg" x1="0" y1="0" x2="400" y2="280"><stop stop-color="#1A2838"/><stop offset="1" stop-color="#0E1420"/></linearGradient>
    <linearGradient id="of-gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFE566"/><stop offset="1" stop-color="#9A7420"/></linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#of-bg)" rx="8"/>
  <rect x="0" y="200" width="400" height="80" fill="#2A3848" fill-opacity="0.5"/>
  <!-- Workstations row -->
  <g>
    <rect x="32" y="100" width="88" height="10" rx="2" fill="#4A3020"/>
    <rect x="40" y="110" width="6" height="48" fill="#3A2410"/><rect x="106" y="110" width="6" height="48" fill="#3A2410"/>
    <rect x="48" y="72" width="56" height="32" rx="2" fill="#2A3848" stroke="#4A5868"/>
    <rect x="52" y="76" width="48" height="24" rx="1" fill="#1A2838"/>
    <rect x="56" y="80" width="40" height="16" fill="#4A6888" fill-opacity="0.5"/>
    <rect x="152" y="100" width="88" height="10" rx="2" fill="#4A3020"/>
    <rect x="160" y="72" width="56" height="32" rx="2" fill="#2A3848" stroke="#4A5868"/>
    <rect x="164" y="76" width="48" height="24" rx="1" fill="#1A2838"/>
    <rect x="272" y="100" width="88" height="10" rx="2" fill="#4A3020"/>
    <rect x="280" y="72" width="56" height="32" rx="2" fill="#2A3848" stroke="#4A5868"/>
    <rect x="284" y="76" width="48" height="24" rx="1" fill="#1A2838"/>
  </g>
  <!-- Office chairs -->
  <ellipse cx="76" cy="168" rx="16" ry="8" fill="#415A77" fill-opacity="0.7"/>
  <ellipse cx="196" cy="168" rx="16" ry="8" fill="#415A77" fill-opacity="0.7"/>
  <ellipse cx="316" cy="168" rx="16" ry="8" fill="#415A77" fill-opacity="0.7"/>
  <!-- Plants -->
  <rect x="360" y="148" width="16" height="14" rx="2" fill="#6A4030"/>
  <ellipse cx="368" cy="136" rx="14" ry="16" fill="#3A8A58" fill-opacity="0.75"/>
  <!-- Ceiling panels -->
  <g stroke="#E8C547" stroke-opacity="0.1">
    <line x1="0" y1="40" x2="400" y2="40"/><line x1="0" y1="56" x2="400" y2="56"/>
  </g>
  <!-- Whiteboard -->
  <rect x="32" y="24" width="120" height="48" rx="3" fill="#F5F5F5" fill-opacity="0.9" stroke="url(#of-gold)" stroke-opacity="0.4"/>
  <line x1="48" y1="44" x2="100" y2="44" stroke="#4ECDC4" stroke-opacity="0.5"/>
  <line x1="48" y1="56" x2="80" y2="56" stroke="#E85D04" stroke-opacity="0.4"/>
