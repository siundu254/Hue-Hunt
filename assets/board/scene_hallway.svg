<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="hw-persp" x1="200" y1="20" x2="200" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4A5A6A"/><stop offset="0.5" stop-color="#2A3848"/><stop offset="1" stop-color="#1A2838"/>
    </linearGradient>
    <linearGradient id="hw-gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFE566"/><stop offset="1" stop-color="#9A7420"/></linearGradient>
  </defs>
  <rect width="400" height="280" fill="#101820" rx="8"/>
  <!-- Perspective corridor -->
  <path d="M80 40 L320 40 L360 260 L40 260 Z" fill="url(#hw-persp)"/>
  <line x1="200" y1="40" x2="200" y2="260" stroke="#E8C547" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Floor tiles -->
  <g stroke="#E8C547" stroke-opacity="0.12">
    <line x1="100" y1="80" x2="300" y2="80"/><line x1="90" y1="120" x2="310" y2="120"/>
    <line x1="75" y1="160" x2="325" y2="160"/><line x1="55" y1="200" x2="345" y2="200"/>
    <line x1="40" y1="240" x2="360" y2="240"/>
  </g>
  <!-- Lockers -->
  <g>
    <rect x="108" y="72" width="36" height="88" rx="2" fill="#5A6878" stroke="#8A98A8" stroke-width="0.8"/>
    <rect x="152" y="72" width="36" height="88" rx="2" fill="#4A5868" stroke="#8A98A8" stroke-width="0.8"/>
    <rect x="196" y="72" width="36" height="88" rx="2" fill="#5A6878" stroke="#8A98A8" stroke-width="0.8"/>
    <rect x="240" y="72" width="36" height="88" rx="2" fill="#4A5868" stroke="#8A98A8" stroke-width="0.8"/>
    <line x1="108" y1="100" x2="144" y2="100" stroke="#3A4858"/><line x1="108" y1="128" x2="144" y2="128" stroke="#3A4858"/>
    <circle cx="138" cy="86" r="2" fill="url(#hw-gold)"/><circle cx="182" cy="86" r="2" fill="url(#hw-gold)"/>
    <circle cx="226" cy="86" r="2" fill="url(#hw-gold)"/><circle cx="270" cy="86" r="2" fill="url(#hw-gold)"/>
  </g>
  <!-- Bulletin board -->
  <rect x="288" y="88" width="48" height="56" rx="2" fill="#8B4513" fill-opacity="0.6" stroke="url(#hw-gold)" stroke-opacity="0.4"/>
  <rect x="294" y="94" width="18" height="14" rx="1" fill="#FFE566" fill-opacity="0.5"/>
  <rect x="316" y="94" width="14" height="18" rx="1" fill="#4ECDC4" fill-opacity="0.4"/>
  <rect x="294" y="112" width="36" height="10" rx="1" fill="#E85D04" fill-opacity="0.35"/>
  <!-- Ceiling lights -->
  <ellipse cx="160" cy="48" rx="30" ry="20" fill="#FFE566" fill-opacity="0.12"/>
  <ellipse cx="240" cy="48" rx="30" ry="20" fill="#FFE566" fill-opacity="0.12"/>
  <rect x="156" y="36" width="8" height="6" rx="1" fill="#F5F0E8" fill-opacity="0.7"/>
  <rect x="236" y="36" width="8" height="6" rx="1" fill="#F5F0E8" fill-opacity="0.7"/>
  <!-- Bench -->
  <rect x="148" y="200" width="104" height="10" rx="2" fill="#5C3820"/>
  <rect x="156" y="210" width="6" height="24" fill="#3A2410"/>
  <rect x="238" y="210" width="6" height="24" fill="#3A2410"/>
  <!-- Coat hooks -->
  <g stroke="url(#hw-gold)" stroke-opacity="0.5" stroke-width="1.5">
    <path d="M88 100 Q92 108 88 116"/><path d="M96 100 Q100 108 96 116"/>
    <path d="M104 100 Q108 108 104 116"/>
  </g>
</svg>
