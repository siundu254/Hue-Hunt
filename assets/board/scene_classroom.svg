<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="cl-bg" x1="0" y1="0" x2="400" y2="280"><stop stop-color="#1A3A5C"/><stop offset="1" stop-color="#0E2238"/></linearGradient>
    <linearGradient id="cl-board" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#2A6A48"/><stop offset="1" stop-color="#1A4A32"/></linearGradient>
    <linearGradient id="cl-floor" x1="0" y1="180" x2="0" y2="280"><stop stop-color="#8A8070"/><stop offset="1" stop-color="#5A5048"/></linearGradient>
    <linearGradient id="cl-gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFE566"/><stop offset="1" stop-color="#9A7420"/></linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#cl-bg)" rx="8"/>
  <rect x="0" y="188" width="400" height="92" fill="url(#cl-floor)"/>
  <!-- Whiteboard -->
  <rect x="32" y="24" width="336" height="72" rx="4" fill="url(#cl-board)" stroke="url(#cl-gold)" stroke-width="1.5"/>
  <rect x="40" y="32" width="320" height="56" rx="2" fill="#1E5040" fill-opacity="0.5"/>
  <text x="56" y="68" fill="#FFE566" font-family="Outfit,sans-serif" font-size="22" font-weight="800">ABC  123</text>
  <line x1="56" y1="76" x2="180" y2="76" stroke="#E8C547" stroke-opacity="0.4" stroke-width="1.5"/>
  <!-- Clock -->
  <circle cx="352" cy="44" r="18" fill="#F5F0E8" stroke="#A89880" stroke-width="1.2"/>
  <line x1="352" y1="44" x2="352" y2="32" stroke="#2A2820" stroke-width="1.5"/>
  <line x1="352" y1="44" x2="362" y2="48" stroke="#E85D04" stroke-width="1.5"/>
  <!-- Teacher desk -->
  <rect x="280" y="148" width="88" height="12" rx="2" fill="#5C3820"/>
  <rect x="292" y="160" width="8" height="32" fill="#3A2410"/>
  <rect x="348" y="160" width="8" height="32" fill="#3A2410"/>
  <!-- Student desks 3x4 -->
  <g>
    <rect x="40" y="120" width="56" height="10" rx="2" fill="#8A8070"/>
    <rect x="44" y="130" width="6" height="24" fill="#5A5048"/>
    <rect x="86" y="130" width="6" height="24" fill="#5A5048"/>
    <rect x="112" y="120" width="56" height="10" rx="2" fill="#8A8070"/>
    <rect x="116" y="130" width="6" height="24" fill="#5A5048"/>
    <rect x="158" y="130" width="6" height="24" fill="#5A5048"/>
    <rect x="184" y="120" width="56" height="10" rx="2" fill="#8A8070"/>
    <rect x="188" y="130" width="6" height="24" fill="#5A5048"/>
    <rect x="230" y="130" width="6" height="24" fill="#5A5048"/>
    <rect x="40" y="168" width="56" height="10" rx="2" fill="#8A8070"/>
    <rect x="44" y="178" width="6" height="24" fill="#5A5048"/>
    <rect x="112" y="168" width="56" height="10" rx="2" fill="#8A8070"/>
    <rect x="184" y="168" width="56" height="10" rx="2" fill="#8A8070"/>
    <rect x="40" y="216" width="56" height="10" rx="2" fill="#8A8070"/>
    <rect x="112" y="216" width="56" height="10" rx="2" fill="#8A8070"/>
    <rect x="184" y="216" width="56" height="10" rx="2" fill="#8A8070"/>
  </g>
  <!-- Pencils & supplies -->
  <rect x="48" y="108" width="20" height="4" rx="1" fill="#FFE566" transform="rotate(-12 58 110)"/>
  <rect x="120" y="106" width="16" height="4" rx="1" fill="#E85D04" transform="rotate(8 128 108)"/>
  <rect x="196" y="108" width="18" height="4" rx="1" fill="#4ECDC4"/>
  <!-- Globe -->
  <circle cx="320" cy="108" r="22" fill="#4ECDC4" fill-opacity="0.4" stroke="url(#cl-gold)" stroke-width="1"/>
  <ellipse cx="320" cy="108" rx="22" ry="8" stroke="#E8C547" stroke-opacity="0.35" fill="none"/>
  <!-- Window -->
  <rect x="24" y="104" width="8" height="64" fill="#8ECAE6" fill-opacity="0.35"/>
