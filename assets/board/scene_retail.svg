<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="rt-bg" x1="0" y1="0" x2="400" y2="280"><stop stop-color="#2A2030"/><stop offset="1" stop-color="#141018"/></linearGradient>
    <linearGradient id="rt-gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFE566"/><stop offset="1" stop-color="#9A7420"/></linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#rt-bg)" rx="8"/>
  <!-- Store shelves -->
  <g>
    <rect x="24" y="24" width="352" height="16" fill="#5A5048"/>
    <rect x="24" y="72" width="352" height="16" fill="#5A5048"/>
    <rect x="24" y="120" width="352" height="16" fill="#5A5048"/>
    <rect x="24" y="40" width="80" height="32" rx="2" fill="#ECE4D4" fill-opacity="0.5"/>
    <rect x="112" y="40" width="80" height="32" rx="2" fill="#D8D0C0" fill-opacity="0.5"/>
    <rect x="200" y="40" width="80" height="32" rx="2" fill="#ECE4D4" fill-opacity="0.5"/>
    <rect x="288" y="40" width="80" height="32" rx="2" fill="#D8D0C0" fill-opacity="0.5"/>
    <rect x="24" y="88" width="80" height="32" rx="2" fill="#D8D0C0" fill-opacity="0.5"/>
    <rect x="112" y="88" width="80" height="32" rx="2" fill="#ECE4D4" fill-opacity="0.5"/>
    <rect x="200" y="88" width="80" height="32" rx="2" fill="#FFC83D" fill-opacity="0.35"/>
    <rect x="288" y="88" width="80" height="32" rx="2" fill="#ECE4D4" fill-opacity="0.5"/>
  </g>
  <!-- Sale sign -->
  <rect x="200" y="148" width="80" height="36" rx="3" fill="#E63946" fill-opacity="0.75" stroke="url(#rt-gold)"/>
  <text x="240" y="172" fill="#FFE566" font-family="Outfit,sans-serif" font-size="16" font-weight="900" text-anchor="middle">SALE</text>
  <!-- Shopping cart -->
  <path d="M80 200 L100 200 L112 240 L160 240" stroke="#8A8078" stroke-width="2" fill="none"/>
  <circle cx="120" cy="248" r="8" fill="#3A3428"/><circle cx="152" cy="248" r="8" fill="#3A3428"/>
  <rect x="88" y="208" width="24" height="16" rx="2" fill="#4A4840" fill-opacity="0.5"/>
  <!-- Checkout counter -->
  <rect x="240" y="196" width="120" height="14" rx="2" fill="#D4C8B8"/>
  <rect x="248" y="210" width="104" height="36" rx="2" fill="#C8B8A0" fill-opacity="0.5"/>
  <!-- Window display -->
  <rect x="24" y="168" width="64" height="80" rx="2" fill="#8ECAE6" fill-opacity="0.15" stroke="url(#rt-gold)" stroke-opacity="0.3"/>
  <rect x="32" y="180" width="24" height="32" rx="1" fill="#FF8A00" fill-opacity="0.4"/>
  <rect x="60" y="188" width="20" height="24" rx="1" fill="#4ECDC4" fill-opacity="0.35"/>
</svg>
