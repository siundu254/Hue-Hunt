  <rect x="60" y="100" width="8" height="4" rx="1" fill="#3AB8B0" fill-opacity="0.6"/>

  <!-- Fruit bowl -->
  <ellipse cx="280" cy="106" rx="18" ry="8" fill="#E8D8C0" fill-opacity="0.7"/>
  <circle cx="272" cy="100" r="6" fill="#E85D04" fill-opacity="0.75"/>
  <circle cx="286" cy="98" r="5" fill="#FFE566" fill-opacity="0.7"/>
  <circle cx="278" cy="94" r="4" fill="#81C784" fill-opacity="0.7"/>

  <!-- Pendant lights -->
  <ellipse cx="120" cy="52" rx="50" ry="50" fill="url(#kt-pendant-glow)"/>
  <ellipse cx="200" cy="52" rx="50" ry="50" fill="url(#kt-pendant-glow2)"/>
  <ellipse cx="280" cy="52" rx="50" ry="50" fill="url(#kt-pendant-glow3)"/>
  <line x1="120" y1="22" x2="120" y2="48" stroke="#E8C547" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="200" y1="22" x2="200" y2="48" stroke="#E8C547" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="280" y1="22" x2="280" y2="48" stroke="#E8C547" stroke-opacity="0.5" stroke-width="1"/>
  <path d="M108 48 Q120 36 132 48" fill="#F5F0E8" stroke="#A89880" stroke-width="0.8"/>
  <path d="M188 48 Q200 36 212 48" fill="#F5F0E8" stroke="#A89880" stroke-width="0.8"/>
  <path d="M268 48 Q280 36 292 48" fill="#F5F0E8" stroke="#A89880" stroke-width="0.8"/>
  <ellipse cx="120" cy="44" rx="6" ry="4" fill="#FFE566" fill-opacity="0.6"/>
  <ellipse cx="200" cy="44" rx="6" ry="4" fill="#FFE566" fill-opacity="0.6"/>
  <ellipse cx="280" cy="44" rx="6" ry="4" fill="#FFE566" fill-opacity="0.6"/>

  <!-- Kitchen island -->
  <rect x="48" y="168" width="200" height="16" rx="3" fill="url(#kt-marble)" stroke="#A89888" stroke-width="0.8"/>
  <rect x="48" y="184" width="200" height="36" rx="2" fill="url(#kt-cabinet)"/>
  <rect x="56" y="190" width="84" height="26" rx="2" fill="url(#kt-cabinet-dark)" fill-opacity="0.15" stroke="#A89880" stroke-opacity="0.3"/>
  <rect x="148" y="190" width="92" height="26" rx="2" fill="url(#kt-cabinet-dark)" fill-opacity="0.15" stroke="#A89880" stroke-opacity="0.3"/>

  <!-- Bar stools -->
  <ellipse cx="88" cy="228" rx="16" ry="6" fill="#3A2410" fill-opacity="0.4"/>
  <ellipse cx="152" cy="228" rx="16" ry="6" fill="#3A2410" fill-opacity="0.4"/>
  <ellipse cx="216" cy="228" rx="16" ry="6" fill="#3A2410" fill-opacity="0.4"/>
  <rect x="82" y="196" width="12" height="36" rx="2" fill="#5C3820"/>
  <rect x="146" y="196" width="12" height="36" rx="2" fill="#5C3820"/>
  <rect x="210" y="196" width="12" height="36" rx="2" fill="#5C3820"/>
  <ellipse cx="88" cy="196" rx="14" ry="5" fill="#6A4830"/>
  <ellipse cx="152" cy="196" rx="14" ry="5" fill="#6A4830"/>
  <ellipse cx="216" cy="196" rx="14" ry="5" fill="#6A4830"/>

  <!-- Stainless fridge -->
  <rect x="328" y="22" width="56" height="168" rx="5" fill="#E8ECEE" stroke="#A8B0B4" stroke-width="1.2"/>
  <line x1="328" y1="108" x2="384" y2="108" stroke="#B8C0C4" stroke-width="1"/>
  <rect x="336" y="30" width="40" height="68" rx="2" fill="#D0D8DC" fill-opacity="0.5"/>
  <rect x="336" y="116" width="40" height="66" rx="2" fill="#D8E0E4" fill-opacity="0.4"/>
  <rect x="368" y="72" width="4" height="24" rx="1" fill="#C0C8CC"/>
  <rect x="368" y="140" width="4" height="32" rx="1" fill="#C0C8CC"/>
  <rect x="340" y="48" width="8" height="4" rx="1" fill="#4ECDC4" fill-opacity="0.35"/>

  <!-- Window herbs -->
  <rect x="328" y="196" width="52" height="48" rx="3" fill="#6BA8C8" fill-opacity="0.25" stroke="#E8C547" stroke-opacity="0.25"/>
  <rect x="336" y="228" width="10" height="12" rx="2" fill="#6A4030"/>
  <rect x="352" y="226" width="10" height="14" rx="2" fill="#6A4030"/>
  <rect x="368" y="230" width="8" height="10" rx="2" fill="#6A4030"/>
  <ellipse cx="341" cy="222" rx="8" ry="10" fill="#3A8A58" fill-opacity="0.7"/>
  <ellipse cx="357" cy="220" rx="8" ry="10" fill="#4A9A68" fill-opacity="0.7"/>
  <ellipse cx="372" cy="224" rx="6" ry="8" fill="#3A8A58" fill-opacity="0.7"/>
</svg>
