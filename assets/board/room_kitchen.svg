  <path d="M128 88 Q128 78 138 78 Q148 78 148 88" stroke="#C0C8C8" stroke-width="3" fill="none" stroke-linecap="round"/>
  <rect x="126" y="88" width="4" height="14" rx="1" fill="#A8B0B0"/>
  <ellipse cx="148" cy="90" rx="3" ry="2" fill="#98A0A0"/>

