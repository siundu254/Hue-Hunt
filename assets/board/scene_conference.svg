<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="cf-bg" x1="0" y1="0" x2="400" y2="280"><stop stop-color="#1E2838"/><stop offset="1" stop-color="#101820"/></linearGradient>
    <linearGradient id="cf-gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFE566"/><stop offset="1" stop-color="#9A7420"/></linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#cf-bg)" rx="8"/>
  <!-- Conference table -->
  <ellipse cx="200" cy="168" rx="140" ry="48" fill="#4A5048" stroke="url(#cf-gold)" stroke-opacity="0.35"/>
  <ellipse cx="200" cy="164" rx="120" ry="38" fill="#5A6058"/>
  <!-- Chairs around table -->
  <g fill="#415A77" fill-opacity="0.7">
    <ellipse cx="80" cy="140" rx="14" ry="8"/><ellipse cx="140" cy="120" rx="14" ry="8"/>
    <ellipse cx="200" cy="112" rx="14" ry="8"/><ellipse cx="260" cy="120" rx="14" ry="8"/>
    <ellipse cx="320" cy="140" rx="14" ry="8"/><ellipse cx="80" cy="196" rx="14" ry="8"/>
    <ellipse cx="320" cy="196" rx="14" ry="8"/>
  </g>
  <!-- Projector screen -->
  <rect x="120" y="24" width="160" height="56" rx="3" fill="#F8F8F8" stroke="url(#cf-gold)" stroke-opacity="0.5"/>
  <rect x="128" y="32" width="144" height="40" fill="#E8E8E8"/>
  <line x1="140" y1="48" x2="260" y2="48" stroke="#4ECDC4" stroke-opacity="0.4"/>
  <line x1="140" y1="58" x2="220" y2="58" stroke="#E85D04" stroke-opacity="0.35"/>
  <!-- Whiteboard side -->
  <rect x="24" y="48" width="64" height="80" rx="2" fill="#F5F5F5" stroke="#8A8078" stroke-opacity="0.4"/>
  <!-- AV cart -->
  <rect x="320" y="200" width="48" height="40" rx="2" fill="#3A3830"/>
  <rect x="328" y="176" width="32" height="28" rx="2" fill="#2A2820"/>
  <!-- Lanyards on table -->
  <rect x="168" y="156" width="20" height="12" rx="2" fill="#4ECDC4" fill-opacity="0.5"/>
  <rect x="212" y="158" width="20" height="12" rx="2" fill="#FF8A00" fill-opacity="0.5"/>
</svg>
