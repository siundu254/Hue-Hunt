<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="od-sky" x1="200" y1="0" x2="200" y2="140"><stop stop-color="#4ECDC4" stop-opacity="0.35"/><stop offset="1" stop-color="#1A4D3A" stop-opacity="0.1"/></linearGradient>
    <linearGradient id="od-gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFE566"/><stop offset="1" stop-color="#9A7420"/></linearGradient>
    <linearGradient id="od-grass" x1="0" y1="140" x2="0" y2="280"><stop stop-color="#3A8A58"/><stop offset="1" stop-color="#1A4D32"/></linearGradient>
  </defs>
  <rect width="400" height="280" fill="url(#od-sky)" rx="8"/>
  <rect x="0" y="140" width="400" height="140" fill="url(#od-grass)"/>
  <!-- Patio stones -->
  <g>
    <rect x="32" y="168" width="56" height="36" rx="3" fill="#9A9088"/><rect x="96" y="168" width="56" height="36" rx="3" fill="#7A7068"/>
    <rect x="160" y="168" width="56" height="36" rx="3" fill="#9A9088"/><rect x="224" y="168" width="56" height="36" rx="3" fill="#6A6058"/>
    <rect x="64" y="212" width="56" height="36" rx="3" fill="#7A7068"/><rect x="128" y="212" width="56" height="36" rx="3" fill="#9A9088"/>
    <rect x="192" y="212" width="56" height="36" rx="3" fill="#6A6058"/>
  </g>
  <!-- Garden beds -->
  <rect x="288" y="180" width="80" height="24" rx="3" fill="#6A4030" fill-opacity="0.6"/>
  <ellipse cx="308" cy="168" rx="16" ry="14" fill="#81C784" fill-opacity="0.75"/>
  <ellipse cx="340" cy="164" rx="18" ry="16" fill="#66BB6A" fill-opacity="0.8"/>
  <ellipse cx="368" cy="170" rx="14" ry="12" fill="#4CAF50" fill-opacity="0.7"/>
  <!-- Trees -->
  <rect x="48" y="100" width="12" height="48" fill="#5C4030"/>
  <ellipse cx="54" cy="88" rx="28" ry="32" fill="#2E7D52" fill-opacity="0.75"/>
  <rect x="320" y="88" width="10" height="56" fill="#5C4030"/>
  <ellipse cx="325" cy="72" rx="24" ry="28" fill="#388E5C" fill-opacity="0.7"/>
  <!-- Fence -->
  <g stroke="#E8C547" stroke-opacity="0.25" stroke-width="1">
    <line x1="16" y1="148" x2="16" y2="168"/><line x1="32" y1="148" x2="32" y2="168"/>
    <line x1="48" y1="148" x2="48" y2="168"/><line x1="16" y1="152" x2="48" y2="152"/>
  </g>
  <!-- Fire pit -->
  <circle cx="200" cy="220" r="20" fill="#3A2818" fill-opacity="0.6" stroke="#E85D04" stroke-opacity="0.4"/>
  <ellipse cx="200" cy="216" rx="10" ry="6" fill="#FF8A00" fill-opacity="0.5"/>
  <!-- Sun -->
  <circle cx="340" cy="48" r="24" fill="#FFE566" fill-opacity="0.45"/>
